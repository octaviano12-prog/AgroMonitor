version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.4
    container_name: agromonitor-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_agromonitor123}
      MYSQL_USER: ${DB_USER:-agromonitor}
      MYSQL_PASSWORD: ${DB_PASSWORD:-agromonitor123}
      MYSQL_DATABASE: ${DB_NAME:-agromonitor_pro}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - agromonitor-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USER:-agromonitor} -p${DB_PASSWORD:-agromonitor123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agromonitor-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${DB_USER:-agromonitor}:${DB_PASSWORD:-agromonitor123}@mysql:3306/${DB_NAME:-agromonitor_pro}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - agromonitor-network

  # Client (Frontend)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: agromonitor-client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - agromonitor-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: agromonitor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - client
    networks:
      - agromonitor-network
    profiles:
      - production

volumes:
  mysql_data:

networks:
  agromonitor-network:
    driver: bridge
